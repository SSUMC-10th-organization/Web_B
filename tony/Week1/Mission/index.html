<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>ToDoList</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>SEUNGJITODO</h1>
    </header>
    <main>
        <form class="input-area">
            <input type="text" id="inputText" placeholder="할 일 입력">
            <button id="btn" type="button">할 일 추가</button>
        </form>

        <article class="todolist">
            <section>
                <h2 class="section-title">할 일</h2>
                <ul id="todoItems"></ul>
            </section>
            <section>
                <h2 class="section-title">완료</h2>
                <ul id="doneItems"></ul>
            </section>
        </article>
    </main>

    <script src="main.js"></script>
</body>
</html>

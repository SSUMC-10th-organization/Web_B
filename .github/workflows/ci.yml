name: CI Check (Biome)

on:
  pull_request:
    # main, develop 및 모든 닉네임/main 브랜치로의 PR에 대해 실행
    branches: [ "main", "develop", "*/main" ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Type Check
        run: pnpm run typecheck

      - name: 🧹 Biome Check
        run: pnpm run check

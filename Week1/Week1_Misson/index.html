<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
  <title>JungBin ToDo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="title">★JB ToDo★ TS ver</div>
        <div class="line"></div>
        <input type="text" id="user-input" placeholder="계획을 입력하세요. [ENTER]를 눌러 계획 저장">
        <div class="todo-group">
            <div class="todo">
                <h2>해야 할 일</h2>
                <ul id="todo-list">
                    
                </ul>

            </div>
            <div class="done">
                <h2>완료 한 일</h2>
                <ul id="done-list">
                    
                </ul> 

            </div>
        </div>
    </div>
</body>
<script src="./dist/index.js"></script>
</html>
